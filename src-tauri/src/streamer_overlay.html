<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hum — OBS source</title>
<style>
  /*
   * Streamer / OBS browser source.
   * Mirrors the live overlay's three-column chrome (album art on the
   * left, lyric stack in the middle, metadata column on the right) but
   * without the edit-mode dashed border. Background is fully
   * transparent so OBS compositing Just Works; a subtle dark plate
   * sits behind the layout for legibility against bright captures.
   * State updates arrive via Server-Sent Events (/events) with a poll
   * fallback to /state if the stream drops. Progress bar + karaoke
   * word index interpolate locally between server pushes so they
   * advance smoothly without flooding the wire.
   *
   * URL params (all optional):
   *   ?theme=default|neon|retro|minimal    — visual preset
   *   ?accent=ff00aa                       — overrides --gold (hex, no #)
   *   ?only=spotify|pandora|youtube|...    — render only this source
   *   ?nochrome=1                          — minimalist 3-line mode (no art, no meta column)
   *
   * The "hum.syvr.dev" watermark in the bottom-right corner is on by
   * default — same brand mark that appears on the desktop overlay. The
   * eventual Pro tier will toggle it from Settings (free keeps it, Pro
   * can hide it). No URL param for it.
   */
  :root {
    --text: #ffffff;
    /* Solid light grays for secondary text — alpha-based dims used to
       wash out on bright/colorful album-art backgrounds because the
       background bleed-through tinted the text and killed contrast.
       Solid values render the same regardless of what's behind. */
    --text-dim: #c8c8c8;
    --text-faint: #909090;
    --gold: #d4af37;
    --plate: rgba(0, 0, 0, 0.45);
  }
  /* Theme presets — applied as body classes from the ?theme= URL param. */
  body.theme-neon {
    --text: #ffffff;
    --text-dim: #ff35c7;
    --text-faint: rgba(255, 53, 199, 0.55);
    --gold: #00ffe0;
    --plate: rgba(20, 0, 30, 0.55);
  }
  body.theme-retro {
    --text: #f7e9c4;
    --text-dim: rgba(247, 233, 196, 0.55);
    --text-faint: rgba(247, 233, 196, 0.32);
    --gold: #ff6b35;
    --plate: rgba(40, 20, 10, 0.55);
  }
  body.theme-minimal {
    --text: #ffffff;
    --text-dim: rgba(255, 255, 255, 0.4);
    --text-faint: rgba(255, 255, 255, 0.25);
    --gold: #ffffff;
    --plate: transparent;
  }
  body.theme-minimal #bg,
  body.theme-minimal #plate { display: none; }
  /* No-chrome mode — back to the original 3-line stripped-down look. */
  body.no-chrome #art,
  body.no-chrome #meta,
  body.no-chrome #bg,
  body.no-chrome #plate { display: none !important; }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
  }
  #wrap {
    position: relative;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 10px 16px;
    overflow: hidden;
  }
  #bg {
    position: absolute;
    inset: -48px;
    background-position: center;
    background-size: cover;
    filter: blur(40px) saturate(1.35) brightness(0.62);
    opacity: 0;
    transition: opacity 320ms ease, background-image 320ms ease;
    z-index: 0;
  }
  #bg.on { opacity: 1; }
  #plate {
    position: absolute;
    inset: 0;
    background: var(--plate);
    z-index: 1;
    pointer-events: none;
  }
  #row {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 14px;
    width: 100%;
    min-height: 0;
  }
  #art {
    flex-shrink: 0;
    height: calc(100vh - 24px);
    width: calc(100vh - 24px);
    max-width: 18vw;
    max-height: 18vw;
    border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
    object-fit: cover;
    background: rgba(255, 255, 255, 0.04);
    display: none;
  }
  #art.on { display: block; }
  #col {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 0;
    gap: 4px;
  }
  .line {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
    max-width: 100%;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.9), 0 3px 10px rgba(0, 0, 0, 0.55);
  }
  .prev, .next {
    font-size: 16px;
    font-weight: 400;
    color: var(--text-dim);
  }
  .cur {
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.2px;
  }
  .empty { opacity: 0.25; }
  .line.anim-in { animation: hum-line-in 340ms cubic-bezier(0.34, 1.56, 0.64, 1) both; }
  @keyframes hum-line-in {
    0%   { transform: translateY(8px); opacity: 0; }
    60%  { opacity: 1; }
    100% { transform: translateY(0); opacity: 1; }
  }
  /* Karaoke per-word gradient — each .word span is a slice of a two-stop
     gradient sized 200% wide, scrolled by background-position. Lit (text
     color) on the left half, dim (text-dim) on the right half. Future
     words sit at 100% 0% (dim half visible), past words at 0% 0% (lit
     half visible), the current word transitions 100% → 0% over its
     duration. background-clip:text restricts the gradient to glyph
     shapes so the words look like solid color blocks, not painted
     rectangles. */
  .word {
    background: linear-gradient(
      to right,
      var(--text) 0%,
      var(--text) 50%,
      var(--text-dim) 50%,
      var(--text-dim) 100%
    );
    background-size: 200% 100%;
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    transition-property: background-position;
    transition-timing-function: linear;
    transition-duration: 0ms;
  }
  .word.future { background-position: 100% 0%; }
  .word.current,
  .word.past { background-position: 0% 0%; }
  /* Track-change stinger — fires when the track key changes. Album art
     slides in from the left, metadata column fades in from the right.
     The lyric line uses the existing .anim-in keyframe. */
  body.track-in #art.on { animation: hum-art-in 600ms cubic-bezier(0.4, 0.0, 0.2, 1) both; }
  body.track-in #meta   { animation: hum-meta-in 600ms 80ms cubic-bezier(0.4, 0.0, 0.2, 1) both; }
  @keyframes hum-art-in {
    0%   { transform: translateX(-18px) scale(0.92); opacity: 0; }
    100% { transform: translateX(0) scale(1); opacity: 1; }
  }
  @keyframes hum-meta-in {
    0%   { transform: translateX(14px); opacity: 0; }
    100% { transform: translateX(0); opacity: 1; }
  }
  #meta {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    max-width: 40ch;
    min-width: 0;
  }
  #meta-text {
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.85;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
    text-align: right;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 1), 0 0 6px rgba(0, 0, 0, 0.85), 0 3px 10px rgba(0, 0, 0, 0.55);
  }
  #meta-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    color: var(--text-faint);
    text-shadow: 0 1px 2px rgba(0, 0, 0, 1), 0 0 6px rgba(0, 0, 0, 0.85), 0 3px 10px rgba(0, 0, 0, 0.55);
  }
  #time-current, #time-duration {
    font-variant-numeric: tabular-nums;
  }
  #bar {
    width: 120px;
    height: 2px;
    background: rgba(127, 127, 127, 0.35);
    border-radius: 1px;
    overflow: hidden;
    position: relative;
  }
  #bar-fill {
    position: absolute;
    inset: 0;
    background: var(--text);
    transform-origin: left center;
    transform: scaleX(0);
    transition: transform 120ms linear;
  }
  #badge {
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
    padding: 1px 6px;
    border-radius: 8px;
    background: rgba(127, 127, 127, 0.18);
    border: 1px solid rgba(127, 127, 127, 0.25);
    opacity: 0.85;
    white-space: nowrap;
  }
  #badge.ad {
    color: var(--gold);
    background: rgba(212, 175, 55, 0.12);
    border-color: rgba(212, 175, 55, 0.5);
  }
  /* PromoCard during ad breaks (image-driven or text-driven fallback). */
  #promo {
    position: relative;
    z-index: 2;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }
  #promo.on { display: flex; }
  #promo-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: none;
  }
  #promo-img.on { display: block; }
  #promo-text {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    text-align: center;
    padding: 0 24px;
  }
  #promo-text.hidden { display: none; }
  #promo-supertitle {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-faint);
  }
  #promo-product {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
  }
  #promo-tagline {
    font-size: 14px;
    color: var(--text-dim);
  }
  #promo-cta {
    margin-top: 4px;
    font-size: 12px;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  /* When the only= URL param filters out the current source, blank the
     whole layout so OBS shows nothing. Streamers can layer multiple
     browser sources (one per service) and have them all pointing at
     the same Hum, each filtering its own source. */
  body.hidden #wrap { visibility: hidden; }
  /* Unsupported-source state — small uppercase caption + GIANT brand-
     colored service headline + small bright remaining-time line. The
     centered watermark stays visible behind the block so the Hum brand
     is always present (just the meta column on the right gets hidden
     since it'd repeat what the headline already says). */
  /* Unsupported state — headline left-aligned in the lyric column so
     the centered watermark behind it stays visible (lyrics text moves
     out of the watermark's vertical centerline). Brand-color backdrop
     fills the plate with a soft service-tinted glow. */
  body.unsupported #cur { text-align: left; line-height: 1; }
  /* Service-brand-color backdrop. The radial gradient is centered on
     the headline area (~22% from the left) and fades out by 72%,
     leaving the right edge of the plate dark for the metadata column.
     `--unsupported-bg` is set inline from JS per service. Defaults to
     transparent so it has no effect when no brand color is known. */
  #unsupported-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    /* z-index 1 = same level as #plate. DOM order puts it AFTER #plate
       so it paints over the dark veil, AND BEFORE #credit so the
       centered watermark still paints on top of the backdrop tint. */
    z-index: 1;
    background: var(--unsupported-bg, transparent);
    transition: background 320ms ease;
  }
  .unsupported-supertitle {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.7;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .unsupported-headline {
    display: block;
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.05;
    transition: color 220ms ease, text-shadow 220ms ease;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .unsupported-subline {
    display: block;
    margin-top: 8px;
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.3px;
    opacity: 0.85;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.95), 0 0 8px rgba(0, 0, 0, 0.6);
  }
  /* Watermark — opt-in via ?credit=1. Sits in the bottom-right corner
     so it doesn't compete with the lyric stack. Uses --gold so the
     ?accent= override re-tints it. Lives inside #wrap so the source
     filter (body.hidden) blanks it along with the rest of the layout,
     and so it stays put under both #row and #promo branches. */
  #credit {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1;
    height: 85%;
    width: auto;
    opacity: 0.18;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="bg"></div>
  <div id="plate"></div>
  <div id="unsupported-bg"></div>
  <div id="row">
    <img id="art" alt="">
    <div id="col">
      <div id="prev" class="line prev empty">♪</div>
      <div id="cur" class="line cur empty">♪</div>
      <div id="next" class="line next empty">♪</div>
    </div>
    <div id="meta">
      <div id="meta-text"></div>
      <div id="meta-row">
        <span id="time-current"></span>
        <div id="bar"><div id="bar-fill"></div></div>
        <span id="time-duration"></span>
        <span id="badge"></span>
      </div>
    </div>
  </div>
  <div id="promo">
    <img id="promo-img" alt="">
    <div id="promo-text">
      <div id="promo-supertitle">Brought to you by SYVR Studios</div>
      <div id="promo-product"></div>
      <div id="promo-tagline"></div>
      <div id="promo-cta"></div>
    </div>
  </div>
  <img id="credit" src="/hum-logo.png" alt="" draggable="false">
</div>
<script>
(() => {
  // ── URL params ───────────────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const themeRaw = (params.get("theme") || "default").toLowerCase();
  const validThemes = ["default", "neon", "retro", "minimal"];
  const theme = validThemes.includes(themeRaw) ? themeRaw : "default";
  if (theme !== "default") {
    document.body.classList.add("theme-" + theme);
  }
  const accentRaw = (params.get("accent") || "").replace(/^#/, "");
  if (/^[0-9a-fA-F]{3,8}$/.test(accentRaw)) {
    document.documentElement.style.setProperty("--gold", "#" + accentRaw);
  }
  if (params.get("nochrome") === "1") {
    document.body.classList.add("no-chrome");
  }
  const onlySource = (params.get("only") || "").toLowerCase().trim();

  // ── DOM refs ─────────────────────────────────────────────────────────
  const $bg    = document.getElementById("bg");
  const $art   = document.getElementById("art");
  const $prev  = document.getElementById("prev");
  const $cur   = document.getElementById("cur");
  const $next  = document.getElementById("next");
  const $row   = document.getElementById("row");
  const $meta  = document.getElementById("meta-text");
  const $tcur  = document.getElementById("time-current");
  const $tdur  = document.getElementById("time-duration");
  const $bar   = document.getElementById("bar-fill");
  const $badge = document.getElementById("badge");
  const $promo = document.getElementById("promo");
  const $promoImg = document.getElementById("promo-img");
  const $promoText = document.getElementById("promo-text");
  const $promoProduct = document.getElementById("promo-product");
  const $promoTagline = document.getElementById("promo-tagline");
  const $promoCta = document.getElementById("promo-cta");

  // ── State ────────────────────────────────────────────────────────────
  let lastState = null;
  let lastTrackKey = "";
  let lastArtKey = "";
  let lastCursor = -2;
  let lastPromoId = "";
  // Karaoke state: tracks which line's words are currently rendered in
  // $cur and which word index was active on the last rAF tick.
  let karaokeLineKey = "";
  let karaokeWordSpans = [];
  let karaokeWordsRef = [];
  let karaokeLineEndMs = 0;
  let karaokeLastIdx = -2;

  // ── Helpers ──────────────────────────────────────────────────────────
  function fmtMs(ms) {
    if (!ms || ms < 0 || !isFinite(ms)) return "0:00";
    const total = Math.floor(ms / 1000);
    const m = Math.floor(total / 60);
    const s = total % 60;
    return `${m}:${s.toString().padStart(2, "0")}`;
  }

  function setLine(el, text, animate, placeholder) {
    if (placeholder === undefined) placeholder = "♪";
    const newText = text && text.trim() ? text : placeholder;
    const isEmpty = !(text && text.trim());
    if (el.textContent === newText && el.classList.contains("empty") === isEmpty) {
      return;
    }
    el.textContent = newText;
    el.classList.toggle("empty", isEmpty);
    if (animate) {
      el.classList.remove("anim-in");
      void el.offsetWidth;
      el.classList.add("anim-in");
    }
  }

  // Brand color map for the unsupported-state highlight. Mirror of
  // src/Overlay.tsx::serviceBrandColor.
  function serviceBrandColor(name) {
    if (!name) return null;
    const k = name.toLowerCase();
    if (k === "netflix") return "#e50914";
    if (k === "youtube" || k === "youtube music") return "#ff0000";
    if (k === "twitch") return "#9146ff";
    if (k === "hulu") return "#1ce783";
    if (k === "disney+") return "#1f80e0";
    if (k === "prime video" || k === "amazon prime") return "#00a8e1";
    if (k === "hbo" || k === "max") return "#6e2da3";
    if (k === "peacock") return "#fa6400";
    if (k === "apple tv") return "#e8e8e8";
    if (k === "paramount+") return "#0064ff";
    if (k === "crunchyroll") return "#f47521";
    if (k === "pandora") return "#3668ff";
    if (k === "spotify") return "#1ed760";
    if (k === "apple music") return "#fa5760";
    return null;
  }

  // Renders the cur line for the unsupported state. Bypasses setLine so
  // we can layer a small uppercase supertitle ("WATCHING") above the
  // brand-colored headline ("Netflix") plus a "X min remaining" subline.
  function renderUnsupportedCur(lead, highlight, subline, animate) {
    const escape = (s) => String(s).replace(/[&<>"']/g, (c) =>
      ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]
    );
    const color = serviceBrandColor(highlight);
    const cleanLead = (lead || "").replace(/[—\s]+$/, "").trim();
    const parts = [];
    if (cleanLead) {
      parts.push(
        "<div class=\"unsupported-supertitle\">" + escape(cleanLead) + "</div>"
      );
    }
    if (highlight) {
      // Layered text shadow: dark contact for legibility + colored
      // halo for visual interest. Falls back to dark-only when no
      // brand color is known.
      const styleParts = [];
      if (color) {
        styleParts.push("color:" + color);
        styleParts.push(
          "text-shadow:0 2px 4px rgba(0,0,0,0.95), 0 0 28px " + color
          + "88, 0 0 60px " + color + "55"
        );
      } else {
        styleParts.push(
          "text-shadow:0 2px 4px rgba(0,0,0,0.95), 0 0 18px rgba(0,0,0,0.7)"
        );
      }
      parts.push(
        "<div class=\"unsupported-headline\" style=\""
        + styleParts.join(";") + "\">"
        + escape(highlight) + "</div>"
      );
    }
    if (subline) {
      parts.push(
        "<div class=\"unsupported-subline\">" + escape(subline) + "</div>"
      );
    }
    $cur.innerHTML = parts.join("");
    $cur.classList.remove("empty");
    if (animate) {
      $cur.classList.remove("anim-in");
      void $cur.offsetWidth;
      $cur.classList.add("anim-in");
    }
  }

  // A word's "duration" = time until the next word starts, or until the
  // next line starts for the last word. Floored at 80ms so the gradient
  // sweep stays visible on tightly-packed lyrics.
  function wordDurationMs(words, idx, lineEndMs) {
    const w = words[idx];
    if (!w) return 500;
    const nextStart = idx + 1 < words.length ? words[idx + 1].time_ms : lineEndMs;
    return Math.max(80, nextStart - w.time_ms);
  }

  // Build the per-word spans for a karaoke line. Initial state: all
  // words .future (dim, no transition). The rAF tick advances classes.
  function buildKaraokeSpans(words, animate) {
    $cur.innerHTML = "";
    $cur.classList.remove("empty");
    karaokeWordSpans = [];
    const wrap = document.createElement("span");
    wrap.style.display = "inline-block";
    if (animate) {
      wrap.className = "anim-in";
    }
    for (let i = 0; i < words.length; i++) {
      const w = words[i];
      const span = document.createElement("span");
      span.className = "word future";
      span.textContent = w.text;
      // Trailing space so the words don't collide; if the source already
      // included spacing in the text (NetEase does this), the extra
      // whitespace collapses harmlessly.
      if (i < words.length - 1) {
        span.textContent += " ";
      }
      wrap.appendChild(span);
      karaokeWordSpans.push(span);
    }
    $cur.appendChild(wrap);
  }

  function updateKaraokeIdx(newIdx) {
    if (newIdx === karaokeLastIdx) return;
    for (let i = 0; i < karaokeWordSpans.length; i++) {
      const span = karaokeWordSpans[i];
      // Compute class transition. Setting transition-duration BEFORE
      // changing the class so the new background-position interpolation
      // picks up the right duration.
      if (i < newIdx) {
        span.style.transitionDuration = "0ms";
        span.className = "word past";
      } else if (i === newIdx) {
        const dur = wordDurationMs(karaokeWordsRef, i, karaokeLineEndMs);
        span.style.transitionDuration = dur + "ms";
        span.className = "word current";
      } else {
        span.style.transitionDuration = "0ms";
        span.className = "word future";
      }
    }
    karaokeLastIdx = newIdx;
  }

  function clearKaraoke() {
    karaokeLineKey = "";
    karaokeWordSpans = [];
    karaokeWordsRef = [];
    karaokeLineEndMs = 0;
    karaokeLastIdx = -2;
  }

  // Maps the server-supplied source_label to the simple lower-case keys
  // accepted by the ?only= URL param. Streamers can pass aliases like
  // ?only=spotify and have it match "Spotify".
  function sourceMatchesFilter(label, filter) {
    if (!filter) return true;
    const l = (label || "").toLowerCase();
    if (l === filter) return true;
    // Partial match — ?only=apple matches "Apple Music"; ?only=youtube
    // matches "YouTube Music".
    return l.includes(filter);
  }

  // ── Render ───────────────────────────────────────────────────────────
  function render(s) {
    lastState = s;
    const t = s.track || {};
    const lyr = s.lyrics || {};
    const cursor = typeof s.cursor === "number" ? s.cursor : -1;

    // Source filter — when ?only= is set and the current source doesn't
    // match, blank the layout instead of showing the wrong stream's
    // metadata. Lets a streamer layer multiple OBS browser sources
    // (one per app) and only the active source paints.
    const matchesFilter = sourceMatchesFilter(s.source_label, onlySource);
    document.body.classList.toggle("hidden", !matchesFilter);

    const trackKey = (t.title || "") + "|" + (t.artist || "");
    const trackChanged = trackKey !== lastTrackKey && trackKey !== "|";
    lastTrackKey = trackKey;

    // Stinger animation on track change.
    if (trackChanged && matchesFilter) {
      document.body.classList.remove("track-in");
      void document.body.offsetWidth;
      document.body.classList.add("track-in");
      setTimeout(() => document.body.classList.remove("track-in"), 800);
    }

    // Album art.
    const artKey = s.art_key || "";
    if (artKey !== lastArtKey) {
      lastArtKey = artKey;
      if (artKey) {
        const src = "/art?k=" + encodeURIComponent(artKey);
        $art.src = src;
        $art.classList.add("on");
        $bg.style.backgroundImage = `url("${src}")`;
        $bg.classList.add("on");
      } else {
        $art.classList.remove("on");
        $art.removeAttribute("src");
        $bg.classList.remove("on");
        $bg.style.backgroundImage = "";
      }
    }

    // Brand-color backdrop for the unsupported state. Same service-name
    // resolution as renderUnsupportedCur — uses the headline word as
    // the key. Sets a CSS variable so the #unsupported-bg div paints
    // the radial gradient. Cleared (transparent) in every other state.
    const unsupportedBgEl = document.getElementById("unsupported-bg");
    if (lyr.status === "unsupported") {
      const title = (t.title || "").trim();
      const srcLabel = s.source_label || "";
      const KNOWN_VIDEO = /^(netflix|youtube|twitch|hulu|disney\+|prime video|amazon prime|hbo|max|peacock|apple tv|paramount\+|crunchyroll)$/i;
      let svcName = "";
      if (title.endsWith("Now Playing on Pandora")) svcName = "Pandora";
      else if (title && KNOWN_VIDEO.test(title)) svcName = title;
      else if (title && (!srcLabel || title.toLowerCase() !== srcLabel.toLowerCase())) svcName = title;
      else svcName = srcLabel;
      const c = serviceBrandColor(svcName);
      unsupportedBgEl.style.setProperty(
        "--unsupported-bg",
        c
          ? "radial-gradient(ellipse 60% 120% at 22% 50%, " + c + "33 0%, " + c + "14 38%, transparent 72%)"
          : "transparent"
      );
    } else {
      unsupportedBgEl.style.setProperty("--unsupported-bg", "transparent");
    }

    // Ad-break promo card branch.
    if (lyr.status === "ad" && lyr.promo) {
      clearKaraoke();
      $row.style.display = "none";
      $promo.classList.add("on");
      const p = lyr.promo;
      const promoId = p.id || (p.product_name || "");
      const promoChanged = promoId !== lastPromoId;
      lastPromoId = promoId;
      if (p.image_url) {
        $promoImg.src = p.image_url;
        $promoImg.classList.add("on");
        $promoText.classList.add("hidden");
      } else {
        $promoImg.classList.remove("on");
        $promoImg.removeAttribute("src");
        $promoText.classList.remove("hidden");
        $promoProduct.textContent = p.product_name || "";
        $promoTagline.textContent = p.tagline || "";
        $promoCta.textContent = p.cta_text || "";
        if (p.accent_color) {
          $promoCta.style.color = p.accent_color;
        }
      }
      if (promoChanged) {
        $promo.classList.remove("anim-in");
        void $promo.offsetWidth;
        $promo.classList.add("anim-in");
      }
      $badge.textContent = "Ad Break";
      $badge.classList.add("ad");
      $meta.textContent = "";
      return;
    } else {
      $row.style.display = "flex";
      $promo.classList.remove("on");
      $badge.classList.remove("ad");
    }

    // Source badge + metadata header.
    const metaParts = [t.artist, t.title, t.album].filter(x => x && x.trim());
    $meta.textContent = metaParts.join(" · ");
    const label = s.source_label || "";
    $badge.textContent = label;
    $badge.style.display = label ? "inline-block" : "none";

    // Lyric rendering.
    const lines = Array.isArray(lyr.lines) ? lyr.lines : [];
    const isSynced = lyr.status === "synced" && lines.length > 0 && cursor >= 0;
    const cursorChanged = cursor !== lastCursor;
    // Body class so the unsupported-state CSS (centered cur, hidden
    // watermark, supertitle/headline/subline typography) can target
    // selectively. Updated on every render so transitions both into
    // and out of the unsupported branch flip the class correctly.
    document.body.classList.toggle("unsupported", lyr.status === "unsupported");
    lastCursor = cursor;
    if (isSynced) {
      const prev = cursor > 0 ? lines[cursor - 1] : null;
      const cur  = lines[cursor];
      const next = cursor + 1 < lines.length ? lines[cursor + 1] : null;
      setLine($prev, prev ? prev.text : "", false);
      // Karaoke vs flat-text branch for the current line. Karaoke
      // requires per-word timings (SimpMusic's enhanced LRC, NetEase
      // word-level data). Lines without `.words` fall back to the
      // existing flat-text render.
      const curHasWords = cur && Array.isArray(cur.words) && cur.words.length > 0;
      const lineKey = cur ? `${cursor}|${cur.time_ms}|${cur.text}` : "";
      if (curHasWords) {
        if (lineKey !== karaokeLineKey) {
          karaokeLineKey = lineKey;
          karaokeWordsRef = cur.words;
          // Line end = next line's start time (for word-duration calc on
          // the trailing word). Fall back to current line + 5s if there
          // is no next line.
          karaokeLineEndMs = next ? next.time_ms : (cur.time_ms + 5000);
          karaokeLastIdx = -2;
          buildKaraokeSpans(cur.words, cursorChanged);
        }
      } else {
        if (karaokeLineKey !== "") {
          clearKaraoke();
        }
        setLine($cur, cur ? cur.text : "", cursorChanged);
      }
      setLine($next, next ? next.text : "", false);
    } else {
      clearKaraoke();
      if (lyr.status === "unsupported") {
        // Mirror of Overlay.tsx::UnsupportedBlock — branded "Watching X"
        // / "Hum's tuned in — X" with no ♪ placeholders on prev/next and
        // a small "X min remaining" subline when duration is known.
        const title = (t.title || "").trim();
        const src = s.source_label || "";
        const KNOWN_VIDEO = /^(netflix|youtube|twitch|hulu|disney\+|prime video|amazon prime|hbo|max|peacock|apple tv|paramount\+|crunchyroll)$/i;
        const isPandoraTab = title.endsWith("Now Playing on Pandora");
        const isVideoSvc = !!title && KNOWN_VIDEO.test(title);
        const titleIsJustSource = !!src && title.toLowerCase() === src.toLowerCase();
        let lead = "", highlight = "";
        if (isPandoraTab) { lead = "Hum's tuned in —"; highlight = "Pandora"; }
        else if (isVideoSvc) { lead = "Watching"; highlight = title; }
        else if (title && !titleIsJustSource) { highlight = title; }
        else if (src) { lead = "Hum's tuned in —"; highlight = src; }
        else { lead = "Hum's tuned in"; }
        // Remaining-time subline. Uses the same wall-clock interpolation
        // as the progress-bar tick so the count stays current between
        // server pushes.
        let subline = null;
        const durMs = Number(t.duration_ms) || 0;
        if (durMs > 0) {
          let pos = Number(t.position_ms) || 0;
          if (t.state === "playing") {
            const last = Number(t.last_update_unix_ms) || 0;
            if (last > 0) pos += Math.max(0, Date.now() - last);
          }
          const remainingMs = Math.max(0, durMs - pos);
          const min = Math.round(remainingMs / 60000);
          if (min >= 1) subline = min + " min remaining";
          else if (remainingMs >= 5000) subline = "less than a minute remaining";
        }
        setLine($prev, "", false, "");
        setLine($next, "", false, "");
        renderUnsupportedCur(lead, highlight, subline, trackChanged);
      } else {
        let mid;
        switch (lyr.status) {
          case "fetching":     mid = t.title ? "♪ fetching — " + t.title : "♪ fetching…"; break;
          case "not_found":    mid = t.title ? "♪ no lyrics for " + t.title : "♪ no lyrics"; break;
          case "instrumental": mid = "♪ instrumental"; break;
          case "plain":        mid = lyr.plain || "♪ unsynced lyrics"; break;
          case "error":        mid = "♪ error fetching lyrics"; break;
          case "idle":
          default:             mid = t.title ? "♪ " + t.title : "♪";
        }
        setLine($prev, "", false);
        setLine($cur, mid, trackChanged);
        setLine($next, "", false);
      }
    }
  }

  // ── rAF tick — progress bar + karaoke word index ─────────────────────
  function interpolatedPosMs(t) {
    let pos = Number(t.position_ms) || 0;
    if (t.state === "playing") {
      const last = Number(t.last_update_unix_ms) || 0;
      if (last > 0) {
        pos += Math.max(0, Date.now() - last);
      }
    }
    return pos;
  }

  function tick() {
    requestAnimationFrame(tick);
    const s = lastState;
    if (!s) return;
    const t = s.track || {};

    // Progress bar.
    const dur = Number(t.duration_ms) || 0;
    if (dur <= 0) {
      $tcur.textContent = "";
      $tdur.textContent = "";
      $bar.style.transform = "scaleX(0)";
      $bar.parentElement.style.visibility = "hidden";
    } else {
      $bar.parentElement.style.visibility = "visible";
      const pos = Math.min(interpolatedPosMs(t), dur);
      $bar.style.transform = `scaleX(${(pos / dur).toFixed(4)})`;
      $tcur.textContent = fmtMs(pos);
      $tdur.textContent = fmtMs(dur);
    }

    // Unsupported-state subline ("X min remaining") — recompute from
    // the interpolated position so it stays current between state
    // pushes. DOM write only when the text actually changes.
    if (s.lyrics && s.lyrics.status === "unsupported" && dur > 0) {
      const sublineEl = $cur.querySelector(".unsupported-subline");
      if (sublineEl) {
        const pos2 = interpolatedPosMs(t);
        const remainingMs = Math.max(0, dur - pos2);
        const min = Math.round(remainingMs / 60000);
        let next = "";
        if (min >= 1) next = min + " min remaining";
        else if (remainingMs >= 5000) next = "less than a minute remaining";
        if (next && sublineEl.textContent !== next) sublineEl.textContent = next;
      }
    }

    // Karaoke word index. Walks the line's words; finds the highest
    // index whose time_ms <= interpolated position. updateKaraokeIdx
    // bails when the index hasn't changed, so per-frame cost is just
    // the loop — no DOM writes on stable frames.
    if (karaokeWordSpans.length > 0 && karaokeWordsRef.length > 0) {
      const pos = interpolatedPosMs(t);
      let idx = -1;
      for (let i = 0; i < karaokeWordsRef.length; i++) {
        if (karaokeWordsRef[i].time_ms <= pos) {
          idx = i;
        } else {
          break;
        }
      }
      updateKaraokeIdx(idx);
    }
  }
  tick();

  // ── SSE + poll fallback ──────────────────────────────────────────────
  let sseOpen = false;
  let pollTimer = null;

  function startSse() {
    const es = new EventSource("/events");
    es.addEventListener("open", () => {
      sseOpen = true;
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    });
    es.addEventListener("state", (ev) => {
      try { render(JSON.parse(ev.data)); } catch (_) {}
    });
    es.addEventListener("error", () => {
      if (!sseOpen && !pollTimer) {
        startPollFallback();
      }
    });
  }

  function startPollFallback() {
    const POLL_MS = 500;
    async function poll() {
      try {
        const res = await fetch("/state", { cache: "no-store" });
        if (!res.ok) return;
        render(await res.json());
      } catch (_) {}
    }
    poll();
    pollTimer = setInterval(poll, POLL_MS);
  }

  startSse();
})();
</script>
</body>
</html>
