<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hum — OBS source</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    color: #fff;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
  }
  #wrap {
    position: relative;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 12px 16px;
    box-sizing: border-box;
  }
  #row {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 14px;
    width: 100%;
    min-height: 0;
  }
  #art {
    flex-shrink: 0;
    border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.6);
    object-fit: cover;
    display: none; /* shown when src is set */
  }
  #col {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 0;
    align-items: flex-start;
    gap: 6px;
  }
  .line {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
    max-width: 92vw;
    text-shadow: 0 2px 6px rgba(0,0,0,0.95), 0 0 14px rgba(0,0,0,0.65);
    transition: opacity 220ms ease, color 220ms ease;
  }
  .prev, .next {
    font-size: 16px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
  }
  .cur {
    font-size: 26px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 0.2px;
  }
  .empty { opacity: 0.2; }
</style>
</head>
<body>
<div id="wrap">
  <div id="row">
    <img id="art" alt="">
    <div id="col">
      <div id="prev" class="line prev empty">♪</div>
      <div id="cur" class="line cur empty">♪</div>
      <div id="next" class="line next empty">♪</div>
    </div>
  </div>
</div>
<script>
(() => {
  const $prev = document.getElementById("prev");
  const $cur  = document.getElementById("cur");
  const $next = document.getElementById("next");
  const $art  = document.getElementById("art");

  // The streamer page is intentionally simple: poll, render. No rAF
  // interpolation (the server already computes the cursor for us).
  // OBS browser-source doesn't need 60fps text animation — 4Hz polling
  // looks the same to viewers since lines change every few seconds.
  const POLL_MS = 250;
  let lastTrackKey = "";
  let lastArtKey = "";

  function setLine(el, text) {
    if (text && text.trim()) {
      el.textContent = text;
      el.classList.remove("empty");
    } else {
      el.textContent = "♪";
      el.classList.add("empty");
    }
  }

  async function poll() {
    try {
      const res = await fetch("/state", { cache: "no-store" });
      if (!res.ok) return;
      const s = await res.json();
      const t = s.track || {};
      const lyr = s.lyrics || {};
      const cursor = typeof s.cursor === "number" ? s.cursor : -1;

      const trackKey = (t.title || "") + "|" + (t.artist || "");
      const trackChanged = trackKey !== lastTrackKey;
      lastTrackKey = trackKey;

      // Album art: fetched separately by the desktop app and broadcast
      // via the album-art-loaded Tauri event — NOT in /state. For the
      // browser-source we'd need a /art endpoint to serve it. Hide for
      // v1; add /art in a follow-up if streamers ask.
      $art.style.display = "none";

      const lines = Array.isArray(lyr.lines) ? lyr.lines : [];
      const isSynced = lyr.status === "synced" && lines.length > 0 && cursor >= 0;
      if (isSynced) {
        const prev = cursor > 0 ? lines[cursor - 1] : null;
        const cur  = lines[cursor];
        const next = cursor + 1 < lines.length ? lines[cursor + 1] : null;
        setLine($prev, prev ? prev.text : "");
        setLine($cur,  cur  ? cur.text  : "");
        setLine($next, next ? next.text : "");
      } else {
        // Status fallback so the overlay doesn't render blank between songs.
        let mid;
        switch (lyr.status) {
          case "fetching":     mid = t.title ? "♪ fetching — " + t.title : "♪ fetching…"; break;
          case "not_found":    mid = t.title ? "♪ no lyrics for " + t.title : "♪ no lyrics"; break;
          case "instrumental": mid = "♪ instrumental"; break;
          case "plain":        mid = "♪ unsynced lyrics"; break;
          case "error":        mid = "♪ error fetching lyrics"; break;
          case "idle":
          default:             mid = t.title ? "♪ " + t.title : "♪";
        }
        setLine($prev, "");
        setLine($cur, mid);
        setLine($next, "");
      }
    } catch (e) {
      // Server not reachable yet, or transient network blip. Keep
      // polling — never crash the loop.
    }
  }

  poll();
  setInterval(poll, POLL_MS);
})();
</script>
</body>
</html>
